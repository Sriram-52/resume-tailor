<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#4f46e5" />
          <stop offset="0.55" stop-color="#5b73f0" />
          <stop offset="1" stop-color="#7db3ff" />
        </linearGradient>
        <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#6ea8fe" />
          <stop offset="1" stop-color="#4f46e5" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0b1220" flood-opacity="0.28" />
        </filter>
      </defs>

      <!-- squircle background -->
      <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg)" />
      <!-- soft top sheen -->
      <rect x="64" y="64" width="896" height="440" rx="224" fill="#ffffff" opacity="0.06" />

      <!-- resume sheet -->
      <g filter="url(#shadow)">
        <rect x="300" y="232" width="424" height="560" rx="40" fill="#ffffff" />
      </g>

      <!-- header: avatar chip + name/title lines -->
      <rect x="344" y="288" width="104" height="104" rx="24" fill="url(#chip)" />
      <rect x="472" y="304" width="196" height="26" rx="13" fill="#2b3242" />
      <rect x="472" y="348" width="150" height="18" rx="9" fill="#aeb6c4" />

      <!-- divider -->
      <rect x="344" y="432" width="336" height="5" rx="2.5" fill="#e6e9ef" />

      <!-- body lines (one accent = the tailored highlight) -->
      <rect x="344" y="474" width="336" height="18" rx="9" fill="#ccd2dd" />
      <rect x="344" y="512" width="300" height="18" rx="9" fill="#ccd2dd" />
      <rect x="344" y="558" width="256" height="20" rx="10" fill="#6ea8fe" />
      <rect x="344" y="598" width="320" height="18" rx="9" fill="#ccd2dd" />
      <rect x="344" y="636" width="284" height="18" rx="9" fill="#ccd2dd" />
      <rect x="344" y="682" width="230" height="18" rx="9" fill="#ccd2dd" />

      <!-- AI sparkle, top-right corner -->
      <path
        d="M818 178 L836 218 L876 236 L836 254 L818 294 L800 254 L760 236 L800 218 Z"
        fill="#ffffff"
        opacity="0.92"
      />
    </svg>
  </body>
</html>
