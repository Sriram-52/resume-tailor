name: Release

# Build and publish an ad-hoc signed arm64 DMG whenever a version tag is pushed.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the GitHub Release and upload the DMG

jobs:
  release:
    name: Build DMG (macOS arm64)
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer/main/preload
        run: pnpm build

      - name: Package DMG (ad-hoc signed via afterPack hook)
        # --publish never: electron-builder only builds the DMG. The release +
        # upload is done by the next step (softprops), so electron-builder must
        # not try to publish (which would demand a GH_TOKEN it doesn't need).
        run: pnpm exec electron-builder --mac --arm64 --publish never
        env:
          # No Apple credentials: identity is null and we ad-hoc sign in afterPack.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          fail_on_unmatched_files: true
          body: |
            ## Resume Tailor ${{ github.ref_name }}

            Runs on your **Claude Code subscription** — install and log into Claude Code first.

            ### Install (Apple Silicon)
            1. Open the DMG and drag **Resume Tailor** to Applications.
            2. The app is **ad-hoc signed** (free, not notarized), so macOS blocks the first launch. To open it, either:
               - **System Settings → Privacy & Security → Open Anyway**, or
               - run once in Terminal:
                 ```
                 xattr -dr com.apple.quarantine "/Applications/Resume Tailor.app"
                 ```
            3. Launch it normally after that.
